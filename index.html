<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indeterminate Navigation</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main">
        <svg id="curves"></svg>
        <div class="cursor"></div>
        <div id="center-content" class="center-content">
            <!-- Content can be injected here when rearranged -->
        </div>
        
        <!-- Work information panel -->
        <section class="work-panel" id="work-panel">
            <img class="work-info-image" alt="">
            <div class="work-info-year-duration"></div>
            <div class="work-info-medium"></div>
            <div class="work-info-description"></div>
            <div class="work-info-performance"></div>
            <div class="work-audio-links"></div>
        </section>
    </div>
    
    <script src="soundEngine.js"></script>
    <script src="script.js"></script>
</body>
</html>
